<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KIN Password Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
        }

        *:focus {
            outline: none;
        }

        body {
            font-family: Consolas, monaco, monospace;
            background-color: #0e0e0e;
            padding: 50px;
        }

        .login {
            margin: 20px auto;
            width: 250px;
        }

        .login-screen {
            background-color: #242424;
            padding: 20px;
            border-radius: 5px;
        }

        .login-form {
            text-align: center;
        }

        .control-group {
            margin-bottom: 10px;
        }

        #outputInfo {
            color: green;
            font-family: Consolas, monaco, monospace;
            font-size: 11px;
        }

        #outputPassword,
        #outputPassword2 {
            cursor: pointer;
        }

        #outputPassword {
            background-color: #f7df5f;
            font-size: 25px;
            font-weight: bold;
            color: #000;
        }

        #outputPassword2 {
            background-color: #ffffff;
            font-size: 25px;
            font-weight: bold;
            color: #000;
        }

        #outputPassword:hover,
        #outputPassword2:hover {
            background-color: #8aceff;
            color: #000000;
        }

        .tt-dropdown-menu {
            background-color: #ECF0F1;
            border: 1px solid #5c5c5c;
            text-align: left;
            width: 250px;
            padding: 0 0 0 10px;
            font-size: 15px;
        }

        input {
            text-align: center;
            color: #728f78;
            background-color: #0e0e0e;
            border: 2px solid transparent;
            border-radius: 3px;
            font-family: Consolas, monaco, monospace;	 
            font-size: 14px;
            font-weight: 200;
            padding: 10px 0;
            width: 200px;
            transition: border .5s;
        }

        input:focus {
            border: 2px solid #0e0e0e;
            box-shadow: none;
        }

        .btn {
            border: 2px solid transparent;
            background: #50875b;
            color: #000;
            font-size: 18px;
            font-family: Trebuchet MS, sans-serif;
            line-height: 25px;
            padding: 10px 0;
            text-decoration: none;
            text-shadow: none;
            border-radius: 3px;
            box-shadow: none;
            transition: 0.25s;
            display: block;
            width: 200px;
            margin: 0 auto;
            font-weight: bold;
        }
        
        .btn2 {
            border: 2px solid transparent;
            background: #0e0e0e;
            color: #fd4646;
            font-size: 18px;
            line-height: 25px;
            padding: 10px 0;
            text-decoration: none;
            text-shadow: none;
            border-radius: 3px;
            box-shadow: none;
            transition: 0.25s;
            display: block;
            width: 200px;
            margin: 0 auto;
            font-family: Trebuchet MS, sans-serif;
        }
        
        .btn:hover {
            background-color: #30ac49;
        }
        
        .btn2:hover {
            background-color: #fd4646;
            color: #0e0e0e;
        }

        .login-link {
            display: block;
        }
    </style>
</head>




<body>
    <div class="login">
        <div class="login-screen">
            <div class="login-form">
                <div class="control-group">
                    <input autocorrect="off" spellcheck="false" type="text" class="login-field userInput notstored" value="" placeholder="email / username" id="inputUser">
                    <label class="login-field-icon fui-user" for="inputUser"></label>
                </div>

                <div class="control-group">
                    <input autocorrect="off" spellcheck="false" type="text" class="login-field userInput typeahead notstored tt-query" value="" placeholder="website / app" id="inputDomain" autocomplete="off" dir="auto" style="position: relative; vertical-align: top;">
                    <label class="login-field-icon fui-lock" for="inputDomain"></label>
                </div>

                <div class="control-group">
                    <input autocorrect="off" spellcheck="false" type="password" class="login-field userInput stored" value="" placeholder="master password" id="inputPhrase">
                    <label class="login-field-icon fui-lock" for="inputPhrase"></label>
                </div>

                <div class="control-group" id="outputInfo"></div>

                <div class="control-group" id="copiedMessage" style="display:none; color:#8aceff; font-size:12px; font-weight:bold;">
                    Copied
                </div>

                <div class="control-group">
                    <a class="btn btn-primary btn-large btn-block" href="#" id="showPassword">generate password</a>
                </div>

                <div class="control-group">
                    <input autocorrect="off" size="30" spellcheck="false" style="display:none" name="kalille" type="text" class="login-field" value="" placeholder="Computing" id="outputPassword">
                </div>

                <div class="control-group">
                    <input autocorrect="off" size="30" spellcheck="false" style="display:none" name="kalille2" type="text" class="login-field" value="" placeholder="Computing2" id="outputPassword2">
                </div>

                <div class="control-group">
                    <a class="btn2 login-link deletecache" href="#" id="resetForm">reset form</a>
                </div>
            </div>
        </div>
    </div>
