<!DOCTYPE html>
<!-- Modified KIN Password Generator
     - Default generated password length = 12
     - Master password input is type="password" (no 'stored' class so it won't be saved in localStorage)
     - Toggle checkbox to show/hide master password
     - Dummy hidden credentials + readonly-on-load trick to reduce browser password-generation/autofill prompts
-->

<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>KIN Password Generator (modified)</title>

<style>
     * {
     box-sizing: border-box;
 }
 *:focus {
     outline: none;
 }
 body {
     font-family: Consolas, monaco, monospace;
     background-color:  #0e0e0e;
     padding: 50px;
 }
 .login {
     margin: 20px auto;
     width: 250px;
 }
 .login-screen {
     background-color:#242424;
     padding: 20px;

 }
 .app-title {

 }
 .login-form {
     text-align: center;
 }
 .control-group {
     margin-bottom: 10px;
 }
 #outputInfo {
     color: green;

     font-size: 11px;
 }
 #outputPassword {
     background-color: #f7df5f;
    font-size: 25px;
    font-weight: bold;
    color:#000;
 }
 .tt-dropdown-menu {
     background-color: #ECF0F1;
     border: 1px solid #5c5c5c;
     text-align: left;
     width: 250px;
     padding: 0 0 0 10px;
     font-size: 15px;
 }
 input {
     text-align: center;
color: #728f78;
     background-color: #0e0e0e;
     border: 2px solid transparent;
     border-radius: 3px;
     font-family: Consolas, monaco, monospace;     
     font-size: 14px;
     font-weight: 200;
     padding: 10px 0;
     width: 200px;
     transition: border .5s;
 }

     box-shadow: none;
 }
 .btn {
     border: 2px solid transparent;
     background: #50875b;
     color: #000;
     font-size: 18px;
font-family: Trebuchet MS, sans-serif;
     line-height: 25px;
     padding: 10px 0;
     text-decoration: none;
     text-shadow: none;
     border-radius: 3px;
     box-shadow: none;
     transition: 0.25s;
     display: block;
     width: 200px;
     margin: 0 auto;
font-weight: bold;
 }
 
 .btn2 {
     border: 2px solid transparent;
     background: #0e0e0e;
     color: #fd4646;
     font-size: 18px;
     line-height: 25px;
     padding: 10px 0;
     text-decoration: none;
     text-shadow: none;
     border-radius: 3px;
     box-shadow: none;
     transition: 0.25s;
     display: block;
     width: 200px;
     margin: 0 auto;
font-family: Trebuchet MS, sans-serif;

 }
 
 .btn:hover {
     background-color: #30ac49;
 }
 
 .btn2:hover {
     background-color: #fd4646;
color: #0e0e0e;
 }
.btn3 {
     border: 2px solid transparent;
     background: #8aceff;
     color: #000000;
     font-size: 18px;
     line-height: 25px;
     padding: 10px 0;
     text-decoration: none;
     text-shadow: none;
     border-radius: 3px;
     box-shadow: none;
     transition: 0.25s;
     display: block;
     width: 200px;
     margin: 0 auto;
font-family: Trebuchet MS, sans-serif;

 }
.btn3:hover {
     background-color: #ffc800;
color: #000000;
 }
 .help {
     padding: 10px 0;
 }
 .left {
     float: left;
 }
 .right {
     float: right;
 }
 .login-link {
     
     display: block;
 }
 #info {
     display: none;
     margin: 10px 0;
 }
 #info.active {
     display: block;
 }
 h2,
 h3 {
     font-family: Consolas, monaco, monospace;
     font-size: 16px;
     color: #444;
 }
 p {
     font-size: 14px;
     color: #666;
 }

}
.copied {
    position: relative;
    display: inline-block;
}

<script>
// --- Begin modifications & important handlers ---

// The original page included many crypto functions (hex_sha512, b64_sha512, bCrypt, ascii85, etc).
// The code below assumes those functions remain available in the context (as in your original page).

// We'll re-implement the generate_password logic and UI wiring consistent with the original,
// but with the requested modifications:
//  - Default generated length = 12
//  - Master password input is NOT stored in localStorage (we removed the 'stored' class in HTML)
//  - Add toggle show/hide control
//  - Readonly-on-load trick to reduce autofill/generation prompts
//  - Dummy hidden credentials already placed in HTML

// Re-create relevant variables to match original script's usage.
var $output, $user, $phrase, $domain, $length, $info, $help;

$(document).ready(function () {

    $user = $('#inputUser');
    $output = $('#outputPassword');
    $phrase = $('#inputPhrase');
    $domain = $('#inputDomain');
    $length = $('#inputLength');
    $info = $('#outputInfo');
    $help = $('#info');

    // restore only stored fields (we removed 'stored' from the master password so it won't be saved)
    if (localStorage["inputLength"]) {
        $('#inputLength').val(localStorage["inputLength"]);
    }

    if (localStorage["inputPhrase"]) {
        // Note: inputPhrase was previously stored; since we removed 'stored' class in HTML, this line
        // will not be triggered by change handlers for new input. You can keep or remove this.
        $('#inputPhrase').val(localStorage["inputPhrase"]);
    }

    // Save any inputs with class 'stored' (master password no longer has that class)
    $('.stored').change(function () {
        localStorage[$(this).attr('id')] = $(this).val();
    });

    $('.deletecache').on('click', function () {
        localStorage.clear();
        $('.stored').val("");
        $('.notstored').val("");
        $('#outputPassword').hide();
        return false;
    });

    $("#modal-launcher").click(function (e) {
        $help.addClass("active");
        e.preventDefault();
    });

    $("#modal-footer").click(function (e) {
        $help.removeClass("active");
        e.preventDefault();
    });

    // Prevent autofill / password-generation heuristics:
    // Set the master password field readonly on load; remove readonly on user focus.
    $phrase.prop('readonly', true);
    $phrase.on('focus', function () {
        $(this).prop('readonly', false);
    });

    // Toggle show/hide master password
    $('#toggleShowPhrase').on('change', function () {
        var checked = $(this).is(':checked');
        var $ph = $('#inputPhrase');

        // Ensure readonly is removed when toggling
        $ph.prop('readonly', false);

        // Attempt to change type; if browser disallows, replace input with clone preserving events
        try {
            $ph.attr('type', checked ? 'text' : 'password');
        } catch (e) {
            // fallback: clone the node (preserve current value and id)
            var $new = $ph.clone().prop('type', checked ? 'text' : 'password');
            $ph.replaceWith($new);
            $ph = $new;
        }

        // Re-bind focus to remove readonly for the (possibly cloned) input
        $('#inputPhrase').off('focus.toggleReadonly').on('focus.toggleReadonly', function () {
            $(this).prop('readonly', false);
        });

        // Re-bind other behaviors for the clone if necessary (e.g., input event used below)
        $('#inputPhrase').on('keydown change', function (e) {
            var key = e.which;
            if (e.type == 'change' || key == 8 || key == 32 || (key > 45 && key < 91) || (key > 95 && key < 112) || (key > 185 && key < 223)) {
                $output.hide();
                $phrase.css('background-color', '#0e0e0e');
                $user.css('background-color', '#0e0e0e');
                $domain.css('background-color', '#0e0e0e');
                $length.css('background-color', '#0e0e0e');
            }  else if (key == 13) {
                $(this).blur();
                $('#showPassword').trigger('click');
                e.preventDefault();
            } 
        });

    });

    // showPassword handler: default Len changed to 12
    $('#showPassword').on('click', function (e) {

        var Phrase = clean($('#inputPhrase').val());
        var User = $user.val().replace(/\s/g, '').toLowerCase();
        var Domain = $domain.val().replace(/\s/g, '').toLowerCase();
        var Len = 12; // default length now 12

        if (!User) {
            $user.css('background-color', '#f4cccc');
            $info.html("Please enter a user name").show().delay(2000).fadeOut('slow');
        } else if (!Domain) {
            $domain.css('background-color', '#f4cccc');
            $info.html("Please enter a valid website or app name (e.g., google)").show().delay(2000).fadeOut('slow');
        } else if ((!Len) || (isNaN(Len / 1) == true)) {
            $length.css('background-color', '#f4cccc');
            $info.html("Please enter a valid numerical length for your password").show().delay(2000).fadeOut('slow');
        } else if (!Phrase) {
            $phrase.css('background-color', '#f4cccc');
            $info.html("Please enter your master password").show().delay(2000).fadeOut('slow');
        } else {
            var hostPattern = /^([a-zA-Z0-9-]+)$/;
            if (hostPattern.test(Domain) == false) {

// Copy helper
function copyToClipboard(elem) {
    var target = elem;

    // select the content
    var currentFocus = document.activeElement;

    target.focus();
    target.setSelectionRange(0, target.value.length);

    // copy the selection
    var succeed;

    try {
      succeed = document.execCommand("copy");
    } catch (e) {
      console.warn(e);

      succeed = false;
    }

    // Restore original focus
    if (currentFocus && typeof currentFocus.focus === "function") {
      currentFocus.focus();
    }

    if (succeed) {
      $(".copied").animate({ top: -25, opacity: 0 }, 700, function() {
        $(this).css({ top: 0, opacity: 1 });
      });
    }

    return succeed;
  }
