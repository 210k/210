// Maps base array conversions into safe password display strings using an internal index mapping
function binb2encoded(input, mode) {
    var index_symbols = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    var index_symbols2 = "BCDFGHJKLMNPQRSTVWXYZbcdfghjklmnpqrstvwxyz123456789!.$@";
    var symbols = (mode == 2) ? index_symbols2 : index_symbols;
    var result = [];
    var factor = symbols.length;
    for (var i = 0; i < input.length; i++) {
        var value = input[i];
        var string = [];
        for (var j = 0; j < 5; j++) {
            string.push(symbols.charAt(value % factor));
            value = Math.floor(value / factor);
        }
        result.push(string.reverse().join(""));
    }
    return result.join("");
}

// Formats chunks using custom string padding lookups
function c(input, length, result) {
    var p = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ.-:+=^!/*?&<>()[]{}@%#$_|~`";
    for (var i = 0; i < length; i += 4) {
        var n = ((input[i] * 256 + input[i + 1]) * 256 + input[i + 2]) * 256 + input[i + 3];
        if (n == 0) {
            result.push("z");
        } else {
            var t = [];
            for (var j = 0; j < 5; j++) {
                t.push(p.charAt(n % 85));
                n = Math.floor(n / 85);
            }
            result.push(t.reverse().join(""));
        }
    }
}

// Converts output keys to clean ascii85 standard formatting strings 
function ascii85(input) {
    var result = [],
        reminder = input.length % 4,
        length = input.length - reminder;
    c(input, length, result);
    if (reminder) {
        var t = input.slice(length);
        while (t.length < 4) {
            t.push(0);
        }
        c(t, 4, result);
        var x = result.pop();
        if (x == "z") {
            x = "!!!!!";
        }
        result.push(x.substr(0, reminder + 1));
    }
    return result.join("");
}

// Controls visual display state notification animations
function showCopiedMessage() {
    $("#copiedMessage").stop(true, true).fadeIn(150).delay(800).fadeOut(250);
}

// Automatically focuses, selects text selections, and executes system clipboard events cleanly
function copyAndFlashCopied(elem) {
    var target = elem;
    var originalValue = target.value;
    var currentFocus = document.activeElement;

    target.focus();
    target.setSelectionRange(0, target.value.length);

    try {
        document.execCommand("copy");
        showCopiedMessage();
    } catch (e) {
        console.warn("Unable to copy automatically.");
    }
    
    if (currentFocus && typeof currentFocus.focus === "function") {
        currentFocus.focus();
    }
}

// Primary calculations wrapper bound to user submission event actions
$("#showPassword").on("click", function() {
    var user = $("#inputUser").val().replace(regex, subst).trim().toLowerCase();
    var domain = $("#inputDomain").val().replace(regex, subst).trim().toLowerCase();
    var master = $("#inputPhrase").val();

    if (user.length < 1 || domain.length < 1 || master.length < 1) {
        $("#outputInfo").text("Error: All fields are required.");
        return false;
    }

    var base_salt = user + "@" + domain;
    
    // Core password generation parameters (Salt string, Iteration settings, Length constraints)
    var key1 = pbkdf2(master, base_salt + ":1", 5000, 20);
    var key2 = pbkdf2(master, base_salt + ":2", 5000, 20);

    var arr1 = [];
    for (var i = 0; i < key1.length; i++) arr1.push(key1.charCodeAt(i));
    var pass1 = ascii85(arr1).substr(0, 12);

    var arr2 = [];
    for (var j = 0; j < key2.length; j++) arr2.push(key2.charCodeAt(j));
    var pass2 = binb2encoded(arr2, 2).substr(0, 12);

    // Dynamic field injection displays results smoothly
    $("#outputPassword").val(pass1).show();
    $("#outputPassword2").val(pass2).show();
    $("#outputInfo").html("Success! Click on a password to copy it.");
    
    return false;
});
